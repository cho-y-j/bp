# ============================================================================
#  작업온 — 전체 스택 (프로덕션/통합 실행)
#  postgres:16 + api(NestJS) + web(Next.js) + nginx(리버스 프록시)
#
#  실행:  docker compose -f infra/docker-compose.yml up -d --build
#  주의:  루트에 .env 를 두고 값(POSTGRES_*, JWT_SECRET 등)을 채운다.
# ============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: jakeobon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jakeobon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jakeobon}
      POSTGRES_DB: ${POSTGRES_DB:-jakeobon}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-jakeobon} -d ${POSTGRES_DB:-jakeobon}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - jakeobon

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: jakeobon-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      TZ: Asia/Seoul
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-jakeobon}:${POSTGRES_PASSWORD:-jakeobon}@postgres:5432/${POSTGRES_DB:-jakeobon}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost}
      # 공유/확인서 링크(카톡 공유용)에 박히는 공개 웹 주소 — 운영 도메인으로 반드시 지정.
      PUBLIC_WEB_URL: ${PUBLIC_WEB_URL:-http://localhost}
      # 사업자등록 진위확인(공공데이터포털). 미설정이면 verify 는 501 스텁.
      GOV_DATA_SERVICE_KEY: ${GOV_DATA_SERVICE_KEY:-}
      # 카카오 로그인 활성화 여부. 실연동 전까지 false(스텁 501).
      KAKAO_ENABLED: ${KAKAO_ENABLED:-false}
      # 기상청 단기예보(폭염 스캔). 미설정이면 스캔 비활성(로그만).
      KMA_SERVICE_KEY: ${KMA_SERVICE_KEY:-}
      # FCM 서비스계정 JSON 경로(컨테이너 내부). 미설정이면 푸시는 로그만.
      FCM_SERVICE_ACCOUNT_PATH: ${FCM_SERVICE_ACCOUNT_PATH:-}
    volumes:
      - uploads:/app/uploads
      # FCM 서비스계정 JSON 등 비밀 파일 마운트(읽기전용). infra/secrets/ 에 fcm.json 을 두고
      # FCM_SERVICE_ACCOUNT_PATH=/app/secrets/fcm.json 로 지정. 디렉터리가 없으면 생성해 둔다.
      - ./secrets:/app/secrets:ro
    healthcheck:
      # /health 는 전역 prefix 제외 라우트(포트 3000). curl 미설치 대비 node 로 확인.
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://127.0.0.1:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - jakeobon

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    container_name: jakeobon-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      TZ: Asia/Seoul
      PORT: 3001
      # SSR(서버 컴포넌트)에서 api 컨테이너로 직접 접속. 브라우저는 상대 /api → nginx 프록시.
      API_INTERNAL_URL: http://api:3000/api
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://127.0.0.1:3001/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - jakeobon

  nginx:
    image: nginx:1.27-alpine
    container_name: jakeobon-nginx
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads:/var/www/uploads:ro
    networks:
      - jakeobon

volumes:
  pgdata:
  uploads:

networks:
  jakeobon:
    driver: bridge
