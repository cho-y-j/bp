# ============================================================================
#  작업온 — 운영(production) 하드닝 오버레이
#
#  base(docker-compose.yml) 위에 겹쳐서 사용한다:
#    docker compose -f infra/docker-compose.yml -f infra/docker-compose.prod.yml up -d --build
#  (infra/deploy.sh 가 이 조합을 자동으로 실행한다.)
#
#  base 대비 추가:
#    - 로그 로테이션(json-file, 10MB×3)  — 디스크 폭주 방지
#    - 리소스 제한(CPU/메모리)           — 단일 VPS 안정성
#    - 명시적 재시작 정책(restart: always)
#    - 볼륨/헬스체크는 base 에 이미 정의(여기선 유지)
#  api 컨테이너 비루트 실행은 backend/Dockerfile(USER nestjs)에서 처리(S1 지적).
#
#  ⚠️ compose override 함정(S1 검수): ports 는 기본적으로 "병합"된다.
#     테스트 포트로 덮어쓸 때는 반드시  ports: !override  를 써서 대체할 것.
#     (운영에서는 base 의 '80:80' 을 그대로 쓰므로 여기서 ports 를 재정의하지 않는다.)
# ============================================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '3'

services:
  postgres:
    restart: always
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          memory: 256M

  api:
    restart: always
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          memory: 192M

  web:
    restart: always
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 512M
        reservations:
          memory: 128M

  nginx:
    restart: always
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    # HTTPS(Let's Encrypt) 종단: certbot 발급 후 아래 주석을 해제하고
    # nginx.conf 를 TLS 서버블록으로 교체한다(DEPLOY.md 3절 참고).
    # ports:
    #   - '443:443'
    # volumes:
    #   - /etc/letsencrypt:/etc/letsencrypt:ro
