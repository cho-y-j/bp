# ============================================================================
#  작업온 — nginx 리버스 프록시
#   /api/     → api (NestJS, :3000)   (전역 prefix /api)
#   /health   → api (헬스체크)
#   /uploads/ → 업로드 파일 정적 서빙 (공유 볼륨)
#   /         → web (Next.js, :3001)
#  (프로덕션: 이 앞단에 Let's Encrypt TLS 종단을 추가한다)
# ============================================================================

upstream jakeobon_api {
  server api:3000;
}

upstream jakeobon_web {
  server web:3001;
}

server {
  listen 80;
  server_name _;

  # 업로드 파일 크기 (서류/사진)
  client_max_body_size 20m;

  # --- API ---
  location /api/ {
    proxy_pass http://jakeobon_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # --- 헬스체크 ---
  location = /health {
    proxy_pass http://jakeobon_api/health;
    proxy_set_header Host $host;
  }

  # --- 업로드 정적 파일 ---
  location /uploads/ {
    alias /var/www/uploads/;
    autoindex off;
    access_log off;
    expires 7d;
  }

  # --- 웹 (Next.js) ---
  location / {
    proxy_pass http://jakeobon_web;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
