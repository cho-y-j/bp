name: workon
description: "작업온 — 현장 작업자 코어 앱 (S4a)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.4
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  open_filex: ^4.5.0
  intl: ^0.20.1
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  geolocator: ^13.0.2
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6
  shared_preferences: ^2.5.5
  connectivity_plus: ^7.2.0
  kakao_flutter_sdk_user: ^2.0.0+1
  home_widget: ^0.9.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  generate: true

# 앱 아이콘 — 오렌지(#F4770C) 배경 + 흰 '온' (웹 파비콘과 통일)
# 생성: dart run flutter_launcher_icons  (입력 PNG 는 tool/gen_brand_assets.py 로 로컬 렌더)
flutter_launcher_icons:
  image_path: "assets/branding/icon_master.png"
  android: true
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#F4770C"
  adaptive_icon_background: "#F4770C"
  adaptive_icon_foreground: "assets/branding/icon_foreground.png"
  adaptive_icon_monochrome: "assets/branding/icon_foreground.png"
  min_sdk_android: 21

# 스플래시 — 종이톤(#F7F6F3, 다크 #131B2A) 배경 + 오렌지 '온' 아이콘
# 생성: dart run flutter_native_splash:create
flutter_native_splash:
  color: "#F7F6F3"
  color_dark: "#131B2A"
  image: "assets/branding/splash_icon.png"
  android: true
  ios: true
  android_12:
    image: "assets/branding/splash_android12.png"
    icon_background_color: "#F4770C"
    icon_background_color_dark: "#F4770C"
    color: "#F7F6F3"
    color_dark: "#131B2A"
